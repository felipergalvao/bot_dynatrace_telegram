name: Dynatrace -> Telegram

on:
  schedule:
    - cron: "2-59/5 * * * *"   # a cada 5 min (UTC)
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore state cache (sent.json)
        uses: actions/cache@v4
        with:
          path: sent.json
          key: sent-json-${{ github.run_id }}
          restore-keys: |
            sent-json-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug Schedule Time
        run: |
          echo "event: ${{ github.event_name }}"

      - name: Install dependencies
        run: pip install requests

      - name: Run notifier
        env:
          DT_URL: ${{ secrets.DT_URL }}
          DT_TOKEN: ${{ secrets.DT_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # Opcional: se quiser forçar base do link (senão o script deriva do DT_URL)
          # DT_UI_BASE: ${{ secrets.DT_UI_BASE }}
          PERSIST_MINUTES: "15"
          DT_FROM: "now-7d"
          DT_PAGE_SIZE: "200"
          MAX_ENRICH: "25"
        run: python dynatrace_to_telegram.py

      - name: Save state cache (sent.json)
        uses: actions/cache@v4
        with:
          path: sent.json
          key: sent-json-${{ github.run_id }}
