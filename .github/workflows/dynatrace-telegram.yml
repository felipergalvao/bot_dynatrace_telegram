name: Dynatrace -> Telegram

on:
  schedule:
    - cron: "2-59/15 * * * *"   # a cada 15 min (UTC)
    - cron: "9-59/15 * * * *"   # backup/redundância
    - cron: "7-59/15 * * * *"   # backup/redundância 2
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore state cache (state.json)
        uses: actions/cache@v4
        with:
          path: state.json
          key: dt-state-${{ github.run_id }}
          restore-keys: |
            dt-state-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Debug Schedule Time
        run: |
          echo "event: ${{ github.event_name }}"
          date -u

      - name: Run notifier
        env:
          DT_URL: ${{ secrets.DT_URL }}
          DT_TOKEN: ${{ secrets.DT_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # Opcional: se quiser forçar base do link (senão o script deriva do DT_URL)
          # DT_UI_BASE: ${{ secrets.DT_UI_BASE }}
          PERSIST_MINUTES: "15"
          DT_FROM: "now-7d"
          DT_PAGE_SIZE: "200"
          MAX_DETAILS: "20"
        run: python dynatrace_to_telegram.py

      - name: Save state cache (state.json)
        uses: actions/cache@v4
        with:
          path: state.json
          key: dt-state-${{ github.run_id }}
